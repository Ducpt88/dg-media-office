services:
  - type: web
    name: ducpt-passport-api
    env: node
    plan: starter
    buildCommand: ""
    startCommand: node passport-upload-server.js
    healthCheckPath: /api/passport/course-signups
    disks:
      - name: passport-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PASSPORT_DATA_DIR
        value: /var/data
      - key: PUBLIC_SITE_URL
        value: https://ducpt.com
      - key: CORS_ORIGIN
        value: https://ducpt.com
      - key: DUCPT_COURSE_ADMIN_KEY
        sync: false
      - key: DUCPT_COURSE_VIDEO_TOKEN_SECRET
        sync: false
      - key: DUCPT_ADMIN_EMAILS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_STARTTLS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_REPLY_TO
        sync: false

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 128" role="img" aria-labelledby="title desc">
  <title id="title">DUCPT Signature logo</title>
  <desc id="desc">Official horizontal DUCPT logo for website header, documents and sales pages</desc>
  <defs>
    <linearGradient id="signature" x1="20" y1="16" x2="225" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#30d7ff"/>
      <stop offset=".56" stop-color="#38e6c5"/>
      <stop offset="1" stop-color="#f5c451"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity=".26"/>

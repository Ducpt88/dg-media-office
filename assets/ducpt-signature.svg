  <g filter="url(#shadow)">
    <rect x="10" y="24" width="76" height="80" rx="24" fill="#07101d"/>
    <path d="M28 42h21c16 0 27 8.8 27 22s-11 22-27 22H28V42Zm18 17v10h4c5.2 0 8-1.8 8-5s-2.8-5-8-5h-4Z" fill="url(#signature)"/>

        <circle cx="75" cy="42" r="23" fill="#fef3c7"/>
        <text x="75" y="50" text-anchor="middle" fill="#0f766e" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="900">FM</text>
        <text x="75" y="89" text-anchor="middle" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="900">File Manager</text>
        <text x="75" y="113" text-anchor="middle" fill="#67e8f9" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800">WINDOWS</text>
      </g>
      <g transform="translate(688 0)">
        <rect width="150" height="132" rx="24" fill="#101820" stroke="#334155"/>
        <circle cx="75" cy="42" r="23" fill="#6366f1"/>
        <text x="75" y="50" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">V</text>
        <text x="75" y="89" text-anchor="middle" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="900">Verba Studio</text>
        <text x="75" y="113" text-anchor="middle" fill="#67e8f9" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800">CREATOR</text>
      </g>
      <g transform="translate(860 0)">
        <rect width="150" height="132" rx="24" fill="#111827" stroke="#f59e0b"/>
        <circle cx="75" cy="42" r="23" fill="#f8fafc"/>
        <text x="75" y="50" text-anchor="middle" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="900">X4</text>
        <text x="75" y="89" text-anchor="middle" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="900">X4 Control</text>
        <text x="75" y="113" text-anchor="middle" fill="#67e8f9" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="800">MANAGER</text>

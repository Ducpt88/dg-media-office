      <stop offset="1" stop-color="#344054"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#101828" flood-opacity=".22"/>

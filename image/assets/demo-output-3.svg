<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Generated YouTube thumbnail example three</title>
  <desc id="desc">A generated YouTube thumbnail variation focused on clean product and marketing style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#022c22"/>
      <stop offset=".55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="784" y="116" width="330" height="450" rx="42" fill="#ffffff" opacity=".95"/>
  <rect x="820" y="162" width="258" height="46" rx="23" fill="#dbeafe"/>
  <rect x="820" y="236" width="258" height="184" rx="26" fill="#1463ff"/>
  <rect x="858" y="460" width="182" height="42" rx="21" fill="#0f172a"/>
  <circle cx="958" cy="328" r="64" fill="#ffffff" opacity=".22"/>
  <text x="72" y="238" font-family="Arial Black, Arial, sans-serif" font-size="84" font-weight="900" fill="#ffffff" filter="url(#shadow)">ANH</text>
  <text x="72" y="330" font-family="Arial Black, Arial, sans-serif" font-size="84" font-weight="900" fill="#ffffff" filter="url(#shadow)">BAN HANG</text>
  <text x="72" y="422" font-family="Arial Black, Arial, sans-serif" font-size="84" font-weight="900" fill="#ccfbf1" filter="url(#shadow)">SANG HON</text>
  <rect x="76" y="486" width="520" height="66" rx="18" fill="#ffffff"/>
  <text x="336" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#0f766e">Giu logo goc, it loi chu</text>
</svg>

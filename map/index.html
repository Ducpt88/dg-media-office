<style>
:root{
  --bg:#f3f4f1;
  --side:#fafaf7;
  --stage:#dedfdb;
  --line:rgba(80,88,84,.18);
  --edge:rgba(68,74,71,.24);
  --edge-active:rgba(37,43,40,.62);
  --ink:#2c312e;
  --muted:#747b76;
  --node:#535957;
  --node-soft:#c9cdca;
  --active:#202523;
  --product:#3f8fb3;
  --automation:#9064ad;
  --content:#4da27b;
  --money:#c8912f;
  --sales:#cc685c;
  --source:#7a838c;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  overflow:hidden;
  background:var(--bg);
  color:var(--ink);
  font:13px/1.45 Inter,ui-sans-serif,system-ui,"Segoe UI",Arial,sans-serif;
}
button,input{font:inherit}
button{cursor:pointer}
.app{height:100vh;display:grid;grid-template-columns:330px minmax(0,1fr)}
.sidebar{
  min-width:0;
  display:flex;
  flex-direction:column;
  border-right:1px solid #d6d8d3;
  background:rgba(250,250,247,.95);
}
.side-top{
  height:46px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  border-bottom:1px solid #d8dad5;
}
.icon-btn{
  width:31px;height:31px;
  display:grid;place-items:center;
  border:0;
  border-radius:6px;
  color:#5d635f;
  background:transparent;
}
.icon-btn:hover,.icon-btn.active{background:#ebede8;color:#242926}
.icon-btn svg{width:18px;height:18px;stroke:currentColor}
.search{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
  width:122px;
  min-height:31px;
  padding:0 9px;
  border:1px solid transparent;
  border-radius:7px;
  background:transparent;
  color:#737a75;
}
.search:focus-within{background:#fff;border-color:#d4d8d1}
.search svg{width:15px;height:15px;stroke:currentColor;flex:0 0 auto}
.search input{width:100%;border:0;outline:0;background:transparent;color:#333}
.tree-scroll{overflow:auto;padding:16px 10px 28px}
.tree-title{
  display:flex;align-items:center;gap:8px;
  padding:8px 8px 7px;
  color:#5d6560;
  font-weight:800;
}
.tree-title svg{width:15px;height:15px;stroke:currentColor}
details{margin:2px 0}
summary{
  list-style:none;
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 8px;
  border-radius:6px;
  color:#5b625d;
  font-weight:700;
}
summary::-webkit-details-marker{display:none}
summary:before{
  content:"";
  width:7px;height:7px;
  border-right:1.8px solid #8b928d;
  border-bottom:1.8px solid #8b928d;
  transform:rotate(-45deg);
}
details[open] summary:before{transform:rotate(45deg)}
.tree-node{
  width:100%;
  min-height:27px;
  display:flex;
  align-items:center;
  gap:8px;
  border:0;
  border-radius:6px;
  background:transparent;
  color:#555d58;
  padding:4px 8px 4px 30px;
  text-align:left;
}
.tree-node:hover,.tree-node.active{background:#e8ebe6;color:#222}
.tree-node i{width:7px;height:7px;border-radius:50%;background:var(--c);box-shadow:0 0 0 3px color-mix(in srgb,var(--c),transparent 78%);flex:0 0 auto}
.tree-node span{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage{
  position:relative;
  overflow:hidden;
  background:var(--stage);
  background-image:
    linear-gradient(rgba(80,88,84,.10) 1px,transparent 1px),
    linear-gradient(90deg,rgba(80,88,84,.10) 1px,transparent 1px);
  background-size:28px 28px;
}
.topbar{
  position:absolute;left:0;right:0;top:0;z-index:20;
  height:46px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(250,250,247,.76);
  border-bottom:1px solid rgba(100,108,104,.16);
  backdrop-filter:blur(12px);
}
.topbar b{font-size:14px;color:#626862}
.stage-actions{
  position:absolute;
  right:14px;top:58px;z-index:25;
  display:grid;gap:7px;
}
.stage-actions .icon-btn{background:rgba(250,250,247,.8);border:1px solid #d6d9d3;backdrop-filter:blur(10px)}
.graph-wrap{position:absolute;inset:46px 0 0;overflow:hidden;cursor:grab;touch-action:none}
.graph-wrap.dragging{cursor:grabbing}
.graph{
  position:absolute;
  left:0;top:0;
  width:1600px;height:980px;
  transform:translate(var(--pan-x,0px),var(--pan-y,0px)) scale(var(--zoom,.86));
  transform-origin:0 0;
  transition:transform .18s ease;
}
.edges{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.edge{stroke:var(--edge);stroke-width:1.15;fill:none}
.edge.active{stroke:var(--edge-active);stroke-width:1.8}
.edge.flow{stroke-dasharray:5 7;animation:edgeFlow 8s linear infinite}
.node{
  position:absolute;
  left:var(--x);top:var(--y);
  width:var(--s);height:var(--s);
  transform:translate(-50%,-50%);
  border:0;
  border-radius:50%;
  background:var(--node);
  color:#3d4440;
  box-shadow:0 0 0 1px rgba(255,255,255,.4),0 7px 18px rgba(70,78,73,.13);
  transition:transform .16s ease,background .16s ease,opacity .16s ease,box-shadow .16s ease;
  animation:nodeFloat 9s ease-in-out infinite;
  animation-delay:calc(var(--i,0) * -0.37s);
}
.node.small{background:#bfc4c0;box-shadow:none}
.node.group{background:var(--c)}
.node.core{
  background:#1f2522;
  box-shadow:0 0 0 7px rgba(255,255,255,.32),0 14px 38px rgba(42,48,45,.24);
}
.node:hover,.node.active{
  transform:translate(-50%,-50%) scale(1.26);
  background:var(--active);
  z-index:8;
  box-shadow:0 0 0 6px rgba(255,255,255,.46),0 16px 34px rgba(42,48,45,.22);
  animation:nodePulse 1.8s ease-in-out infinite;
}
.node.dim{opacity:.18}
.label{
  position:absolute;
  left:var(--x);top:calc(var(--y) + var(--offset));
  transform:translateX(-50%);
  max-width:150px;
  color:#616761;
  font-size:10px;
  font-weight:700;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
  text-shadow:0 1px 0 rgba(255,255,255,.75);
}
.label.core-label{font-size:13px;color:#2d332f;font-weight:900}
.label.dim{opacity:.22}
.motion-paused .node,.motion-paused .edge.flow{animation:none}
@keyframes nodeFloat{
  0%,100%{translate:0 0}
  50%{translate:0 -4px}
}
@keyframes nodePulse{
  0%,100%{box-shadow:0 0 0 6px rgba(255,255,255,.46),0 16px 34px rgba(42,48,45,.22)}
  50%{box-shadow:0 0 0 11px rgba(255,255,255,.32),0 20px 46px rgba(42,48,45,.27)}
}
@keyframes edgeFlow{to{stroke-dashoffset:-48}}
@media(prefers-reduced-motion:reduce){.node,.edge.flow{animation:none}}
.legend{
  position:absolute;left:18px;bottom:18px;z-index:22;
  display:flex;flex-wrap:wrap;gap:7px;
  max-width:calc(100% - 360px);
  padding:9px;
  border:1px solid #d4d8d1;
  border-radius:9px;
  background:rgba(250,250,247,.84);
  backdrop-filter:blur(12px);
}
.legend button{
  display:flex;align-items:center;gap:6px;
  border:0;border-radius:999px;
  padding:6px 9px;
  background:#eef0eb;
  color:#4f5752;
  font-size:11px;
  font-weight:800;
}
.legend button.active{background:#252b27;color:#fff}
.legend i{width:8px;height:8px;border-radius:50%;background:var(--c)}
.info{
  position:absolute;
  right:18px;bottom:18px;z-index:30;
  width:min(340px,calc(100% - 36px));
  display:none;
  grid-template-columns:54px 1fr;
  gap:12px;
  padding:13px;
  border:1px solid #d5d9d2;
  border-radius:10px;
  background:rgba(250,250,247,.94);
  box-shadow:0 18px 60px rgba(40,45,42,.13);
  backdrop-filter:blur(16px);
}
.info.open{display:grid}
.info-mark{
  width:54px;height:54px;
  display:grid;place-items:center;
  border-radius:50%;
  background:var(--c);
  color:#fff;
  font-weight:900;
}
.info-head{display:flex;align-items:flex-start;gap:8px}
.info-head b{flex:1;font-size:14px;color:#282e2a}
.close{
  width:28px;height:28px;
  display:grid;place-items:center;
  border:1px solid #d6dad3;
  border-radius:7px;
  background:#fff;
  color:#555d58;
}
.close svg{width:15px;height:15px;stroke:currentColor}
.info p{margin:5px 0 0;color:#626a64;font-size:12px}
.info small{display:block;margin-top:8px;color:#2f7a60;font-weight:800}
.info-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.info-tags span{border-radius:999px;background:#eef0eb;color:#4d554f;padding:4px 7px;font-size:10px;font-weight:800}
.mobile-tree{display:none}
@media(max-width:880px){
  .app{display:block}
  .sidebar{display:none}
  .stage{height:100vh}
  .mobile-tree{display:grid;position:absolute;left:12px;top:58px;z-index:25;background:rgba(250,250,247,.84);border:1px solid #d6d9d3;backdrop-filter:blur(10px)}
  .graph{--zoom:.5}
  .legend{left:10px;right:10px;bottom:10px;max-width:none}
  .info{left:10px;right:10px;bottom:78px;width:auto}
  .topbar{justify-content:flex-start;padding-left:54px}
  .topbar b{font-size:13px}
}
</style>
</head>

const links=[
  ["dg-core","identity"],["dg-core","dispatch"],["dg-core","team-leader"],["dg-core","mediamart"],["dg-core","app-registry"],["dg-core","daily-report"],["dg-core","memory"],
  ["dispatch","team-leader"],["dispatch","team-workflow"],["dispatch","daily-workflow"],["founder","team-leader"],["team-leader","ops"],["team-leader","brand-video"],["team-leader","youtube"],["team-leader","content-social"],["team-leader","product-code"],["team-leader","finance"],["team-leader","verba-ops"],["team-leader","mediamart"],
  ["ops","inbox"],["ops","today"],["ops","waiting-review"],["inbox","team-leader"],["today","waiting-review"],["waiting-review","founder"],["waiting-review","done"],["done","daily-report"],["daily-workflow","today"],["daily-workflow","daily-report"],["team-workflow","team-leader"],
  ["brand-video","brand-workflow"],["brand-video","video-registry"],["youtube","brand-workflow"],["youtube","social-registry"],["content-social","social-registry"],["content-social","video-registry"],["product-code","app-workflow"],["product-code","app-registry"],["finance","finance-workflow"],["finance","finance-link"],
  ["verba-ops","app-registry"],["verba-ops","verba-apps"],["verba-ops","verba-hub"],["mediamart","website-registry"],["mediamart","social-registry"],["mediamart","video-registry"],["mediamart","finance-link"],
  ["app-registry","verba-apps"],["app-registry","verba-hub"],["app-registry","verba-studio"],["app-registry","agent-dbh"],["verba-apps","verba-hub"],["verba-hub","verba-studio"],["verba-studio","brand-video"],["agent-dbh","ops"],["website-registry","mediamart"],["social-registry","content-social"],["video-registry","brand-video"],["finance-link","finance"],
  ["brand-workflow","waiting-review"],["app-workflow","app-registry"],["finance-workflow","finance-link"],["daily-report","founder"],["memory","dg-core"]
];
const groupColor=id=>groups.find(g=>g.id===id)?.color||"var(--node)";
const byId=id=>nodes.find(n=>n.id===id);
let activeId=null,filter="all",query="",zoom=.86;
const tree=document.getElementById("tree"),edges=document.getElementById("edges"),nodeHost=document.getElementById("nodes"),legend=document.getElementById("legend"),graph=document.getElementById("graph"),info=document.getElementById("info"),wrap=document.querySelector(".graph-wrap");
let panX=0,panY=0,isDragging=false,dragStartX=0,dragStartY=0,startPanX=0,startPanY=0,hasFitted=false;
function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
function initial(name){return String(name).split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase()}
function isRelated(id){
  if(!activeId)return true;
  return id===activeId||links.some(([a,b])=>(a===activeId&&b===id)||(b===activeId&&a===id));
}
function isVisible(n){
  const q=!query||[n.name,n.purpose,...n.tags].join(" ").toLowerCase().includes(query);
  const f=filter==="all"||n.g===filter||n.g==="core";
  return q&&f;
}
function renderTree(){
  tree.innerHTML=groups.map(g=>{
    const items=nodes.filter(n=>n.g===g.id).map(n=>`<button class="tree-node ${n.id===activeId?"active":""}" data-node="${n.id}" style="--c:${groupColor(n.g)}"><i></i><span>${esc(n.name)}</span></button>`).join("");
    return `<details open><summary>${esc(g.name)}</summary>${items}</details>`;
  }).join("");
  tree.querySelectorAll("[data-node]").forEach(btn=>btn.onclick=()=>selectNode(btn.dataset.node));
}
function renderLegend(){
  legend.innerHTML=`<button class="${filter==="all"?"active":""}" data-filter="all"><i style="--c:#535957"></i>Tat ca</button>`+groups.map(g=>`<button class="${filter===g.id?"active":""}" data-filter="${g.id}"><i style="--c:${g.color}"></i>${esc(g.name)}</button>`).join("");
  legend.querySelectorAll("[data-filter]").forEach(btn=>btn.onclick=()=>{filter=btn.dataset.filter;renderAll()});
}
function curve(a,b,active){
  const x1=a.x,y1=a.y,x2=b.x,y2=b.y;
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  const dx=x2-x1,dy=y2-y1;
  const bend=Math.min(90,Math.hypot(dx,dy)*.12);
  const cx=mx-dy/Math.max(1,Math.hypot(dx,dy))*bend;
  const cy=my+dx/Math.max(1,Math.hypot(dx,dy))*bend;
  return `<path class="edge flow ${active?"active":""}" d="M${x1} ${y1} Q${cx} ${cy} ${x2} ${y2}"/>`;
}
function renderGraph(){
  edges.innerHTML=links.map(([a,b])=>{
    const na=byId(a),nb=byId(b);
    if(!na||!nb)return "";
    const active=activeId&&(a===activeId||b===activeId);
    return curve(na,nb,active);
  }).join("");
  nodeHost.innerHTML=nodes.map((n,index)=>{
    const dim=(!isVisible(n)||!isRelated(n))&&!n.core;
    const c=n.core?"#202523":groupColor(n.g);
    const klass=["node",n.core?"core":n.s<=16?"small":n.s>=24?"group":"",activeId===n.id?"active":"",dim?"dim":""].join(" ");
    const labelClass=["label",n.core?"core-label":"",dim?"dim":""].join(" ");
    const offset=`${Math.max(14,n.s/2+10)}px`;
    return `<button class="${klass}" data-node="${n.id}" style="--x:${n.x}px;--y:${n.y}px;--s:${n.s}px;--c:${c};--i:${index}" title="${esc(n.name)}"></button><span class="${labelClass}" style="--x:${n.x}px;--y:${n.y}px;--offset:${offset}">${esc(n.name)}</span>`;
  }).join("");
  nodeHost.querySelectorAll("[data-node]").forEach(btn=>btn.onclick=()=>selectNode(btn.dataset.node));
}
function selectNode(id){
  activeId=id;
  const n=byId(id);
  const related=links.filter(([a,b])=>a===id||b===id).map(([a,b])=>byId(a===id?b:a).name);
  info.classList.add("open");
  document.getElementById("infoMark").style.setProperty("--c",n.core?"#202523":groupColor(n.g));
  document.getElementById("infoMark").textContent=initial(n.name);
  document.getElementById("infoTitle").textContent=n.name;
  document.getElementById("infoText").textContent=n.purpose;
  document.getElementById("infoFlow").textContent=related.length?"Lien ket: "+related.slice(0,5).join(" / "):"";
  document.getElementById("infoTags").innerHTML=n.tags.map(t=>`<span>${esc(t)}</span>`).join("");
  renderAll(false);
}
function renderAll(updateInfo=true){
  renderTree();renderLegend();renderGraph();
  if(updateInfo&&activeId)selectNode(activeId);
}
function applyView(animate=false){
  graph.style.transition=animate?"transform .24s ease":"none";
  graph.style.setProperty("--zoom",zoom);
  graph.style.setProperty("--pan-x",panX+"px");
  graph.style.setProperty("--pan-y",panY+"px");
}
function graphBounds(){
  const pad=wrap.clientWidth<720?420:110;
  const minX=Math.min(...nodes.map(n=>n.x-n.s/2))-pad;
  const maxX=Math.max(...nodes.map(n=>n.x+n.s/2))+pad;
  const minY=Math.min(...nodes.map(n=>n.y-n.s/2))-pad;
  const maxY=Math.max(...nodes.map(n=>n.y+n.s/2))+pad;
  return {minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY};
}
function fitGraph(){
  const box=graphBounds();
  const rect=wrap.getBoundingClientRect();
  const bottomReserve=rect.width<720?92:96;
  const scale=Math.min((rect.width-32)/box.w,(rect.height-bottomReserve-26)/box.h,1.08);
  zoom=Math.max(rect.width<720?.16:.36,scale);
  panX=(rect.width-box.w*zoom)/2-box.minX*zoom;
  panY=(rect.height-bottomReserve-box.h*zoom)/2-box.minY*zoom;
  applyView(true);
}
function zoomAt(clientX,clientY,nextZoom){
  const rect=wrap.getBoundingClientRect();
  const x=clientX-rect.left;
  const y=clientY-rect.top;
  const gx=(x-panX)/zoom;
  const gy=(y-panY)/zoom;
  zoom=Math.max(wrap.clientWidth<720?.16:.32,Math.min(1.6,nextZoom));
  panX=x-gx*zoom;
  panY=y-gy*zoom;
  applyView(false);
}
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();renderAll(false)});
document.getElementById("closeInfo").onclick=()=>{info.classList.remove("open");activeId=null;renderAll(false)};
document.getElementById("toggleInfo").onclick=()=>{activeId?info.classList.toggle("open"):selectNode("dg")};
document.getElementById("zoomIn").onclick=()=>{const r=wrap.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,zoom*1.12)};
document.getElementById("zoomOut").onclick=()=>{const r=wrap.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,zoom/1.12)};
document.getElementById("motion").onclick=e=>{document.body.classList.toggle("motion-paused");e.currentTarget.classList.toggle("active")};
document.getElementById("reset").onclick=()=>{filter="all";query="";activeId=null;document.getElementById("search").value="";info.classList.remove("open");renderAll(false);fitGraph()};
wrap.addEventListener("wheel",e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.1:.9;
  zoomAt(e.clientX,e.clientY,zoom*factor);
},{passive:false});
wrap.addEventListener("pointerdown",e=>{
  if(e.button!==undefined&&e.button!==0)return;
  isDragging=true;
  wrap.classList.add("dragging");
  dragStartX=e.clientX;dragStartY=e.clientY;
  startPanX=panX;startPanY=panY;
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener("pointermove",e=>{
  if(!isDragging)return;
  panX=startPanX+e.clientX-dragStartX;
  panY=startPanY+e.clientY-dragStartY;
  applyView(false);
});
function stopDrag(e){
  if(!isDragging)return;
  isDragging=false;
  wrap.classList.remove("dragging");
  if(e&&e.pointerId!==undefined)wrap.releasePointerCapture(e.pointerId);
}
wrap.addEventListener("pointerup",stopDrag);
wrap.addEventListener("pointercancel",stopDrag);
window.addEventListener("resize",()=>fitGraph());
renderAll(false);
fitGraph();
requestAnimationFrame(fitGraph);
setTimeout(fitGraph,120);
</script>
</body>
</html>

<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="referrer" content="no-referrer">
<title>Khu vực được bảo vệ · DUCPT</title>
<style>
:root{--ink:#14213d;--muted:#667085;--line:#dbeafe;--blue:#2563eb;--purple:#7c3aed}
*{box-sizing:border-box}
body{min-height:100vh;display:grid;place-items:center;margin:0;padding:22px;background:radial-gradient(circle at 50% 0,rgba(37,99,235,.16),transparent 48%),radial-gradient(circle at 84% 18%,rgba(124,58,237,.13),transparent 34%),#f8fafc;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.box{width:min(560px,100%);padding:34px;text-align:center;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.94);box-shadow:0 22px 58px rgba(16,24,40,.1)}
.mark{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;padding:8px 13px;border:1px solid var(--line);border-radius:999px;color:var(--blue);background:#eff6ff;font-size:12px;font-weight:900;letter-spacing:.02em}
h1{margin:0;font-size:clamp(28px,5vw,38px);line-height:1.1;letter-spacing:-.03em}
p{margin:14px auto 0;max-width:440px;color:var(--muted);line-height:1.65}
a{display:inline-flex;margin-top:22px;padding:12px 18px;border-radius:999px;color:#fff;background:linear-gradient(90deg,var(--blue),var(--purple));font-weight:900;text-decoration:none;box-shadow:0 10px 28px rgba(37,99,235,.22)}
</style>
</head>
<body>
<main class="box">
  <span class="mark">● CHỈ XEM QUA PASSPORT</span>
  <h1>Nội dung vận hành được bảo vệ</h1>
  <p>Bản đồ nhân sự không được cung cấp qua URL công khai. Vui lòng đăng nhập Passport để yêu cầu phiên xem chỉ đọc có thời hạn.</p>
  <a href="/passport/">Mở Passport</a>
</main>
</body>
</html>

<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DG BRAND LTD Wiki Graph</title>
<style>
:root{
  --bg:#f3f4f1;
  --side:#fafaf7;
  --stage:#dedfdb;
  --line:rgba(80,88,84,.18);
  --edge:rgba(68,74,71,.24);
  --edge-active:rgba(37,43,40,.62);
  --ink:#2c312e;
  --muted:#747b76;
  --node:#535957;
  --node-soft:#c9cdca;
  --active:#202523;
  --product:#3f8fb3;
  --automation:#9064ad;
  --content:#4da27b;
  --money:#c8912f;
  --sales:#cc685c;
  --source:#7a838c;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  overflow:hidden;
  background:var(--bg);
  color:var(--ink);
  font:13px/1.45 Inter,ui-sans-serif,system-ui,"Segoe UI",Arial,sans-serif;
}
button,input{font:inherit}
button{cursor:pointer}
.app{height:100vh;display:grid;grid-template-columns:330px minmax(0,1fr)}
.sidebar{
  min-width:0;
  display:flex;
  flex-direction:column;
  border-right:1px solid #d6d8d3;
  background:rgba(250,250,247,.95);
}
.side-top{
  height:46px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  border-bottom:1px solid #d8dad5;
}
.icon-btn{
  width:31px;height:31px;
  display:grid;place-items:center;
  border:0;
  border-radius:6px;
  color:#5d635f;
  background:transparent;
}
.icon-btn:hover,.icon-btn.active{background:#ebede8;color:#242926}
.icon-btn svg{width:18px;height:18px;stroke:currentColor}
.search{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
  width:122px;
  min-height:31px;
  padding:0 9px;
  border:1px solid transparent;
  border-radius:7px;
  background:transparent;
  color:#737a75;
}
.search:focus-within{background:#fff;border-color:#d4d8d1}
.search svg{width:15px;height:15px;stroke:currentColor;flex:0 0 auto}
.search input{width:100%;border:0;outline:0;background:transparent;color:#333}
.tree-scroll{overflow:auto;padding:16px 10px 28px}
.tree-title{
  display:flex;align-items:center;gap:8px;
  padding:8px 8px 7px;
  color:#5d6560;
  font-weight:800;
}
.tree-title svg{width:15px;height:15px;stroke:currentColor}
details{margin:2px 0}
summary{
  list-style:none;
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 8px;
  border-radius:6px;
  color:#5b625d;
  font-weight:700;
}
summary::-webkit-details-marker{display:none}
summary:before{
  content:"";
  width:7px;height:7px;
  border-right:1.8px solid #8b928d;
  border-bottom:1.8px solid #8b928d;
  transform:rotate(-45deg);
}
details[open] summary:before{transform:rotate(45deg)}
.tree-node{
  width:100%;
  min-height:27px;
  display:flex;
  align-items:center;
  gap:8px;
  border:0;
  border-radius:6px;
  background:transparent;
  color:#555d58;
  padding:4px 8px 4px 30px;
  text-align:left;
}
.tree-node:hover,.tree-node.active{background:#e8ebe6;color:#222}
.tree-node i{width:7px;height:7px;border-radius:50%;background:var(--c);box-shadow:0 0 0 3px color-mix(in srgb,var(--c),transparent 78%);flex:0 0 auto}
.tree-node span{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage{
  position:relative;
  overflow:hidden;
  background:var(--stage);
  background-image:
    linear-gradient(rgba(80,88,84,.10) 1px,transparent 1px),
    linear-gradient(90deg,rgba(80,88,84,.10) 1px,transparent 1px);
  background-size:28px 28px;
}
.topbar{
  position:absolute;left:0;right:0;top:0;z-index:20;
  height:46px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(250,250,247,.76);
  border-bottom:1px solid rgba(100,108,104,.16);
  backdrop-filter:blur(12px);
}
.topbar b{font-size:14px;color:#626862}
.stage-actions{
  position:absolute;
  right:14px;top:58px;z-index:25;
  display:grid;gap:7px;
}
.stage-actions .icon-btn{background:rgba(250,250,247,.8);border:1px solid #d6d9d3;backdrop-filter:blur(10px)}
.graph-wrap{position:absolute;inset:46px 0 0;overflow:hidden}
.graph{
  position:absolute;
  left:50%;top:50%;
  width:1600px;height:980px;
  transform:translate(-50%,-50%) scale(var(--zoom,.86));
  transform-origin:center;
  transition:transform .2s ease;
}
.edges{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.edge{stroke:var(--edge);stroke-width:1.15;fill:none}
.edge.active{stroke:var(--edge-active);stroke-width:1.8}
.node{
  position:absolute;
  left:var(--x);top:var(--y);
  width:var(--s);height:var(--s);
  transform:translate(-50%,-50%);
  border:0;
  border-radius:50%;
  background:var(--node);
  color:#3d4440;
  box-shadow:0 0 0 1px rgba(255,255,255,.4),0 7px 18px rgba(70,78,73,.13);
  transition:transform .16s ease,background .16s ease,opacity .16s ease,box-shadow .16s ease;
}
.node.small{background:#bfc4c0;box-shadow:none}
.node.group{background:var(--c)}
.node.core{
  background:#1f2522;
  box-shadow:0 0 0 7px rgba(255,255,255,.32),0 14px 38px rgba(42,48,45,.24);
}
.node:hover,.node.active{
  transform:translate(-50%,-50%) scale(1.26);
  background:var(--active);
  z-index:8;
  box-shadow:0 0 0 6px rgba(255,255,255,.46),0 16px 34px rgba(42,48,45,.22);
}
.node.dim{opacity:.18}
.label{
  position:absolute;
  left:var(--x);top:calc(var(--y) + var(--offset));
  transform:translateX(-50%);
  max-width:150px;
  color:#616761;
  font-size:10px;
  font-weight:700;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
  text-shadow:0 1px 0 rgba(255,255,255,.75);
}
.label.core-label{font-size:13px;color:#2d332f;font-weight:900}
.label.dim{opacity:.22}
.legend{
  position:absolute;left:18px;bottom:18px;z-index:22;
  display:flex;flex-wrap:wrap;gap:7px;
  max-width:calc(100% - 360px);
  padding:9px;
  border:1px solid #d4d8d1;
  border-radius:9px;
  background:rgba(250,250,247,.84);
  backdrop-filter:blur(12px);
}
.legend button{
  display:flex;align-items:center;gap:6px;
  border:0;border-radius:999px;
  padding:6px 9px;
  background:#eef0eb;
  color:#4f5752;
  font-size:11px;
  font-weight:800;
}
.legend button.active{background:#252b27;color:#fff}
.legend i{width:8px;height:8px;border-radius:50%;background:var(--c)}
.info{
  position:absolute;
  right:18px;bottom:18px;z-index:30;
  width:min(340px,calc(100% - 36px));
  display:none;
  grid-template-columns:54px 1fr;
  gap:12px;
  padding:13px;
  border:1px solid #d5d9d2;
  border-radius:10px;
  background:rgba(250,250,247,.94);
  box-shadow:0 18px 60px rgba(40,45,42,.13);
  backdrop-filter:blur(16px);
}
.info.open{display:grid}
.info-mark{
  width:54px;height:54px;
  display:grid;place-items:center;
  border-radius:50%;
  background:var(--c);
  color:#fff;
  font-weight:900;
}
.info-head{display:flex;align-items:flex-start;gap:8px}
.info-head b{flex:1;font-size:14px;color:#282e2a}
.close{
  width:28px;height:28px;
  display:grid;place-items:center;
  border:1px solid #d6dad3;
  border-radius:7px;
  background:#fff;
  color:#555d58;
}
.close svg{width:15px;height:15px;stroke:currentColor}
.info p{margin:5px 0 0;color:#626a64;font-size:12px}
.info small{display:block;margin-top:8px;color:#2f7a60;font-weight:800}
.info-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.info-tags span{border-radius:999px;background:#eef0eb;color:#4d554f;padding:4px 7px;font-size:10px;font-weight:800}
.mobile-tree{display:none}
@media(max-width:880px){
  .app{display:block}
  .sidebar{display:none}
  .stage{height:100vh}
  .mobile-tree{display:grid;position:absolute;left:12px;top:58px;z-index:25;background:rgba(250,250,247,.84);border:1px solid #d6d9d3;backdrop-filter:blur(10px)}
  .graph{--zoom:.5;left:41%}
  .legend{left:10px;right:10px;bottom:10px;max-width:none}
  .info{left:10px;right:10px;bottom:78px;width:auto}
  .topbar{justify-content:flex-start;padding-left:54px}
  .topbar b{font-size:13px}
}
</style>
</head>

];
const nodes=[
  {id:"dg",g:"core",name:"DG BRAND LTD",x:800,y:500,s:48,core:true,tags:["ecosystem","operating system"],purpose:"Loi trung tam ket noi san pham, automation, content, sales va proof thanh mot he sinh thai bo tro nhau.",feeds:["verba","brain","video","money","sales"]},
  {id:"verba",g:"products",name:"Verba Studio",x:560,y:290,s:28,tags:["LIVE","AI transcript","demo"],purpose:"Phong thu san xuat video/live, transcript tieng Viet, zoom con tro va chat noi.",feeds:["video","case","sales"]},
  {id:"brain",g:"products",name:"Brain Lite / iMap",x:680,y:250,s:24,tags:["BRAIN","MAP","WIKI"],purpose:"Bien kien thuc roi rac thanh map de hoc lai, tim y tuong va tao brief.",feeds:["content","maps","money"]},
  {id:"portfolio",g:"products",name:"DUCPT Portfolio",x:650,y:395,s:22,tags:["DUCPT","AI","DEMO"],purpose:"Hub showroom san pham AI va cong cu so cua DUCPT.",feeds:["sales","case"]},
  {id:"mini",g:"products",name:"Mini Product Pages",x:485,y:395,s:18,tags:["PAGE","OFFER"],purpose:"Trang ban hang nho cho tung san pham, lien ket ve hub va CRM.",feeds:["sales","crm"]},
  {id:"voice",g:"automation",name:"Voice Adam Clean Denoise",x:1030,y:270,s:22,tags:["VOICE","ADAM","CLEAN"],purpose:"Workflow voice mac dinh cho video: clean transcript, giam nhieu, QA nghe lai.",feeds:["video","money"]},
  {id:"maps",g:"automation",name:"DG Maps YTB Bot",x:1135,y:380,s:24,tags:["BOT","FOLLOW"],purpose:"Theo doi nguon kien thuc, gom bai moi, tao map/text va bao cao Telegram.",feeds:["brain","content"]},
  {id:"pin",g:"automation",name:"Pinterest AutoPost",x:1010,y:455,s:20,tags:["PIN","TRAFFIC"],purpose:"Tao traffic dai han tu visual assets va link ve hub.",feeds:["portfolio","sales"]},
  {id:"gate",g:"automation",name:"Telegram Review Gate",x:910,y:360,s:18,tags:["QA","APPROVE"],purpose:"Cong duyet trung tam truoc khi dang/xuat ban.",feeds:["video","crm"]},
  {id:"video",g:"content",name:"DUC DG Video Workflow",x:535,y:580,s:30,tags:["STYLE","BEAT"],purpose:"Tu y tuong/script/voice/live demo thanh short video QA-approved.",feeds:["money","case","pin"]},
  {id:"content",g:"content",name:"Content Bank",x:650,y:685,s:23,tags:["IDEA","SCRIPT"],purpose:"Kho idea, hook, script va proof footage tai su dung cho social va website.",feeds:["video","money"]},
  {id:"case",g:"content",name:"Case Study Engine",x:690,y:570,s:20,tags:["PROOF","STORY"],purpose:"Bien moi san pham/workflow thanh cau chuyen co van de, giai phap, bang chung.",feeds:["portfolio","sales"]},
  {id:"clips",g:"content",name:"Clip Factory",x:470,y:700,s:18,tags:["SHORT","BATCH"],purpose:"Cat demo dai thanh nhieu clip nho ve product hoac money topic.",feeds:["money","pin"]},
  {id:"money",g:"money",name:"Money Philosophy Channel",x:990,y:600,s:30,tags:["MONEY","DISCIPLINE"],purpose:"Luong video tien, dong luc, ky luat va comeback de keo traffic rong hon.",feeds:["sales","content"]},
  {id:"discipline",g:"money",name:"Discipline Training",x:1130,y:650,s:18,tags:["HABIT","FOCUS"],purpose:"Series ky luat de nuoi niem tin va hanh dong moi ngay.",feeds:["money","crm"]},

  {id:"sales",g:"sales",name:"Offer / Sales Page",x:800,y:190,s:26,tags:["BUY","BOOK"],purpose:"Chuyen traffic thanh lead/order bang offer, proof va CTA ro.",feeds:["crm"]},
  {id:"crm",g:"sales",name:"CRM Follow-up",x:930,y:205,s:20,tags:["LEAD","NURTURE"],purpose:"Theo doi lead den tu content, product page, Telegram va social.",feeds:["sales","gate"]},

  {id:"verbario",g:"sources",name:"verbar.io",x:875,y:805,s:16,tags:["VERBA","SOURCE"],purpose:"Nguon san pham Verba, logo, proof va demo.",feeds:["verba","case"]},
  {id:"social",g:"sources",name:"YouTube / Facebook / Reels",x:610,y:810,s:18,tags:["SOCIAL","PROOF"],purpose:"Kenh phan phoi video, thu hook va gom tin hieu thi truong.",feeds:["money","content","crm"]},
  {id:"telegram",g:"sources",name:"Telegram Ops",x:1010,y:820,s:16,tags:["OPS","REPORT"],purpose:"Noi nhan report, duyet ket qua va quan sat pipeline ngay.",feeds:["gate","crm"]},
  {id:"ltvm",g:"courses",name:"LTVM - Lap Trinh Van Menh",x:1180,y:520,s:14,tags:["course"],purpose:"Node khoa hoc trong wiki, dung lam nguon insight va content.",feeds:["money","content"]},
  {id:"sss",g:"courses",name:"SSS - Sales Success System",x:1110,y:170,s:14,tags:["course"],purpose:"Node sales/course bo tro cho sales page va CRM.",feeds:["sales","crm"]},
  {id:"eagle",g:"courses",name:"Eagle Camp",x:420,y:520,s:14,tags:["course"],purpose:"Node dao tao va community, dung lam proof/lesson.",feeds:["community","case"]},
  {id:"chatgpt",g:"courses",name:"ChatGPT khoa",x:430,y:260,s:14,tags:["course"],purpose:"Node kien thuc AI, lien ket voi product va automation.",feeds:["brain","maps"]}
];
const links=[
  ["dg","verba"],["dg","brain"],["dg","video"],["dg","money"],["dg","sales"],["dg","maps"],["dg","content"],
  ["verba","video"],["verba","case"],["brain","content"],["brain","maps"],["portfolio","sales"],["mini","sales"],
  ["voice","video"],["maps","content"],["pin","portfolio"],["gate","video"],["gate","crm"],["video","money"],["video","case"],
  ["content","video"],["content","money"],["case","sales"],["clips","money"],["clips","pin"],["money","sales"],["discipline","money"],
  ["wisdom","money"],["sales","crm"],["community","case"],["community","content"],["ducpt","portfolio"],["verbario","verba"],
  ["social","money"],["social","content"],["social","crm"],["telegram","gate"],["ltvm","money"],["sss","sales"],["eagle","community"],["chatgpt","brain"]
];
const groupColor=id=>groups.find(g=>g.id===id)?.color||"var(--node)";
const byId=id=>nodes.find(n=>n.id===id);
let activeId=null,filter="all",query="",zoom=.86;
const tree=document.getElementById("tree"),edges=document.getElementById("edges"),nodeHost=document.getElementById("nodes"),legend=document.getElementById("legend"),graph=document.getElementById("graph"),info=document.getElementById("info");
function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
function initial(name){return String(name).split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase()}
function isRelated(id){
  if(!activeId)return true;
  return id===activeId||links.some(([a,b])=>(a===activeId&&b===id)||(b===activeId&&a===id));
}
function isVisible(n){
  const q=!query||[n.name,n.purpose,...n.tags].join(" ").toLowerCase().includes(query);
  const f=filter==="all"||n.g===filter||n.g==="core";
  return q&&f;
}
function renderTree(){
  tree.innerHTML=groups.map(g=>{
    const items=nodes.filter(n=>n.g===g.id).map(n=>`<button class="tree-node ${n.id===activeId?"active":""}" data-node="${n.id}" style="--c:${groupColor(n.g)}"><i></i><span>${esc(n.name)}</span></button>`).join("");
    return `<details open><summary>${esc(g.name)}</summary>${items}</details>`;
  }).join("");
  tree.querySelectorAll("[data-node]").forEach(btn=>btn.onclick=()=>selectNode(btn.dataset.node));
}
function renderLegend(){
  legend.innerHTML=`<button class="${filter==="all"?"active":""}" data-filter="all"><i style="--c:#535957"></i>Tat ca</button>`+groups.map(g=>`<button class="${filter===g.id?"active":""}" data-filter="${g.id}"><i style="--c:${g.color}"></i>${esc(g.name)}</button>`).join("");
  legend.querySelectorAll("[data-filter]").forEach(btn=>btn.onclick=()=>{filter=btn.dataset.filter;renderAll()});
}
function curve(a,b,active){
  const x1=a.x,y1=a.y,x2=b.x,y2=b.y;
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  const dx=x2-x1,dy=y2-y1;
  const bend=Math.min(90,Math.hypot(dx,dy)*.12);
  const cx=mx-dy/Math.max(1,Math.hypot(dx,dy))*bend;
  const cy=my+dx/Math.max(1,Math.hypot(dx,dy))*bend;
  return `<path class="edge ${active?"active":""}" d="M${x1} ${y1} Q${cx} ${cy} ${x2} ${y2}"/>`;
}
function renderGraph(){
  edges.innerHTML=links.map(([a,b])=>{
    const na=byId(a),nb=byId(b);
    const active=activeId&&(a===activeId||b===activeId);
    return curve(na,nb,active);
  }).join("");
  nodeHost.innerHTML=nodes.map(n=>{
    const dim=(!isVisible(n)||!isRelated(n))&&!n.core;
    const c=n.core?"#202523":groupColor(n.g);
    const klass=["node",n.core?"core":n.s<=16?"small":n.s>=24?"group":"",activeId===n.id?"active":"",dim?"dim":""].join(" ");
    const labelClass=["label",n.core?"core-label":"",dim?"dim":""].join(" ");
    const offset=`${Math.max(14,n.s/2+10)}px`;
    return `<button class="${klass}" data-node="${n.id}" style="--x:${n.x}px;--y:${n.y}px;--s:${n.s}px;--c:${c}" title="${esc(n.name)}"></button><span class="${labelClass}" style="--x:${n.x}px;--y:${n.y}px;--offset:${offset}">${esc(n.name)}</span>`;
  }).join("");
  nodeHost.querySelectorAll("[data-node]").forEach(btn=>btn.onclick=()=>selectNode(btn.dataset.node));
}
function selectNode(id){
  activeId=id;
  const n=byId(id);
  const related=links.filter(([a,b])=>a===id||b===id).map(([a,b])=>byId(a===id?b:a).name);
  info.classList.add("open");
  document.getElementById("infoMark").style.setProperty("--c",n.core?"#202523":groupColor(n.g));
  document.getElementById("infoMark").textContent=initial(n.name);
  document.getElementById("infoTitle").textContent=n.name;
  document.getElementById("infoText").textContent=n.purpose;
  document.getElementById("infoFlow").textContent=related.length?"Lien ket: "+related.slice(0,5).join(" / "):"";
  document.getElementById("infoTags").innerHTML=n.tags.map(t=>`<span>${esc(t)}</span>`).join("");
  renderAll(false);
}
function renderAll(updateInfo=true){
  renderTree();renderLegend();renderGraph();
  if(updateInfo&&activeId)selectNode(activeId);
}
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();renderAll(false)});
document.getElementById("closeInfo").onclick=()=>{info.classList.remove("open");activeId=null;renderAll(false)};
document.getElementById("toggleInfo").onclick=()=>{activeId?info.classList.toggle("open"):selectNode("dg")};
document.getElementById("zoomIn").onclick=()=>{zoom=Math.min(1.25,zoom+.08);graph.style.setProperty("--zoom",zoom)};
document.getElementById("zoomOut").onclick=()=>{zoom=Math.max(.48,zoom-.08);graph.style.setProperty("--zoom",zoom)};
document.getElementById("reset").onclick=()=>{zoom=.86;filter="all";query="";activeId=null;document.getElementById("search").value="";graph.style.setProperty("--zoom",zoom);info.classList.remove("open");renderAll(false)};
renderAll(false);
</script>
</body>
</html>
